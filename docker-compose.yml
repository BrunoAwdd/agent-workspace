version: '3.8'

services:
  aw-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - STORAGE_BACKEND=postgres
      - POSTGRES_URL=postgres://aw_user:aw_pass@db:5432/agent_workspace
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agent_network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=aw_user
      - POSTGRES_PASSWORD=aw_pass
      - POSTGRES_DB=agent_workspace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aw_user -d agent_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge

volumes:
  pgdata:
